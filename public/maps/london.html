<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chitra's London Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{margin:0;height:100%;font-family:-apple-system,'Segoe UI',Arial,sans-serif}
#map{height:100%}
.hdr{position:absolute;top:12px;left:56px;z-index:1000;background:#fff;padding:8px 16px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-weight:700;font-size:15px}
.hdr small{font-weight:400;color:#666;display:block}
.legend{position:absolute;bottom:20px;left:12px;z-index:1000;background:#fff;padding:10px 14px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:12.5px;line-height:1.9}
.legend label{display:flex;align-items:center;gap:7px;cursor:pointer}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.5)}
.pop b{font-size:13.5px}.pop .arr{color:#fff;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px}
.pop p{margin:5px 0 2px;font-size:12.5px}.pop .ad{color:#777;font-size:11.5px}
.pop .sent{font-size:11.5px;font-style:italic;color:#444;margin-top:4px}
</style></head><body>
<div id="map"></div>
<div class="hdr">Chitra's London Map <small>22 spots from Instagram saves &middot; July 2026</small></div>
<div class="legend" id="legend"></div>
<script>
const CATS={"coffee": {"label": "Coffee & Cafes", "color": "#8a5a2b"}, "bakery": {"label": "Bakery & Pastry", "color": "#d97706"}, "sweets": {"label": "Sweets & Ice Cream", "color": "#db2777"}, "restaurant": {"label": "Restaurants", "color": "#dc2626"}, "bar": {"label": "Bars & Nightlife", "color": "#7c3aed"}, "shopping": {"label": "Shopping", "color": "#2563eb"}, "culture": {"label": "Museums & Culture", "color": "#0d9488"}}, PLACES=[{"cat": "restaurant", "name": "Master Wei", "famous": "Hand-pulled biang-biang noodles by Wei Guirong", "arr": "Bloomsbury", "addr": "13 Sicilian Avenue, WC1A 2QH", "lat": 51.5177, "lng": -0.1211, "typ": "Xi'an noodles", "sent": "Worth it - locals' lunch pick on Sicilian Avenue"}, {"cat": "restaurant", "name": "Tamila", "famous": "Roti and Chettinad curries by the Tamil Prince team", "arr": "King's Cross", "addr": "8 Caledonian Road, N1 9DU", "lat": 51.5312, "lng": -0.121, "typ": "South Indian", "sent": "Worth it - buzzy 2025 opening that lives up to the pedigree"}, {"cat": "bakery", "name": "Nagare", "famous": "Japanese-inspired bagels; jasmine tea mochi bagel", "arr": "Spitalfields", "addr": "40 Brushfield Street, E1 6AG", "lat": 51.5192, "lng": -0.0762, "typ": "Bagels (Japanese)", "sent": "Viral but genuinely good; go early on weekends"}, {"cat": "restaurant", "name": "Fatt Pundit", "famous": "Momos and crackling spinach", "arr": "Soho", "addr": "77 Berwick Street, W1F 8TH", "lat": 51.5138, "lng": -0.1363, "typ": "Indo-Chinese", "sent": "Worth it - reliable Soho standby, not a trap"}, {"cat": "restaurant", "name": "Brigadiers", "famous": "Army-mess style Indian BBQ, weekend biryanis (JKS group)", "arr": "City", "addr": "1-5 Bloomberg Arcade, EC4N 8AR", "lat": 51.5127, "lng": -0.0906, "typ": "Indian BBQ", "sent": "Worth it - expense-account weekdays; fun on weekends"}, {"cat": "restaurant", "name": "Copper Chimney", "famous": "Mumbai-born North Indian grills and butter chicken", "arr": "Shepherd's Bush", "addr": "Westfield London, W12 7GA", "lat": 51.5077, "lng": -0.2211, "typ": "Indian", "sent": "Fine - solid mall dining, better than the setting suggests"}, {"cat": "restaurant", "name": "Darjeeling Express", "famous": "Asma Khan's home cooking, all-women kitchen; moved June 2026", "arr": "Soho", "addr": "36-40 Rupert Street, W1D 6DW", "lat": 51.5115, "lng": -0.1328, "typ": "Indian (Calcutta)", "sent": "Worth it - new bigger Rupert St site; book ahead"}, {"cat": "restaurant", "name": "Gymkhana", "famous": "Muntjac biryani, kid goat methi keema", "arr": "Mayfair", "addr": "42 Albemarle Street, W1S 4JH", "lat": 51.5093, "lng": -0.1417, "typ": "Indian (2 Michelin)", "sent": "Destination splurge - still delivers; book weeks ahead"}, {"cat": "restaurant", "name": "Noodle Inn", "famous": "Viral hand-pulled noodles", "arr": "Soho", "addr": "4-6 Old Compton Street, W1D 4TA", "lat": 51.5133, "lng": -0.1305, "typ": "Hand-pulled noodles", "sent": "Viral queues - real but they move; weekday off-peak"}, {"cat": "restaurant", "name": "Crisp Pizza W6", "famous": "Cult crispy-edged pizza inside The Chancellors pub", "arr": "Hammersmith", "addr": "25 Crisp Road, W6 9RL", "lat": 51.4886, "lng": -0.2258, "typ": "Pizza (pub)", "sent": "Worth the trek and wait - peak London pub-pizza"}, {"cat": "restaurant", "name": "no.drama", "famous": "Neighbourhood pizza and burgers", "arr": "Shepherd's Bush", "addr": "(moved to Bush Tavern from East Acton)", "lat": 51.5137, "lng": -0.2549, "typ": "Pizza + brunch", "sent": "Check before going - relocated to Bush Tavern, Shepherd's Bush"}, {"cat": "bakery", "name": "The Dusty Knuckle", "famous": "Top-rated sourdough and focaccia sandwiches; social enterprise", "arr": "Dalston", "addr": "Abbot Street Car Park, E8 3DP", "lat": 51.548, "lng": -0.0725, "typ": "Bakery + sandwiches", "sent": "Deserves the hype - sandwiches sell out by early afternoon"}, {"cat": "restaurant", "name": "Akara", "famous": "Bean-fritter small plates by the Michelin-starred Akoko team", "arr": "Borough", "addr": "Arch 208, 18 Stoney Street, SE1 9AD", "lat": 51.5054, "lng": -0.0912, "typ": "West African", "sent": "Worth it - easier booking than Akoko, real value"}, {"cat": "bakery", "name": "Fortitude Bakehouse", "famous": "Viral sticky buns and 'rambutans' on a mews", "arr": "Bloomsbury", "addr": "35 Colonnade, WC1N 1JD", "lat": 51.5233, "lng": -0.1222, "typ": "Bakery (buns)", "sent": "Viral queues - tiny mews spot; go before 11am"}, {"cat": "restaurant", "name": "Agora", "famous": "Souvla, pita and spit-roast lamb below Oma", "arr": "Borough", "addr": "2-4 Bedale Street, SE1 9AL", "lat": 51.5057, "lng": -0.09, "typ": "Greek", "sent": "Worth it - livelier, cheaper sibling of Michelin-starred Oma"}, {"cat": "restaurant", "name": "Rambutan", "famous": "Curries and roti by Cynthia Shanmugalingam", "arr": "Borough", "addr": "10 Stoney Street, SE1 9AD", "lat": 51.5057, "lng": -0.0908, "typ": "Sri Lankan", "sent": "Worth it - market-adjacent but locals still rate it; book"}, {"cat": "restaurant", "name": "The Baring", "famous": "Refined pub cooking, Michelin Bib Gourmand", "arr": "Islington", "addr": "55 Baring Street, N1 3DS", "lat": 51.5364, "lng": -0.0871, "typ": "Gastropub", "sent": "Local gem - proper neighbourhood gastropub, zero tourists"}, {"cat": "bakery", "name": "Don't Tell Dad", "famous": "Pastries by day, bistro nights; Michelin Guide", "arr": "Queen's Park", "addr": "10-14 Lonsdale Road, NW6 6RD", "lat": 51.5343, "lng": -0.2046, "typ": "Bakery + bistro", "sent": "Neighbourhood gem worth crossing town for; brunch queues"}, {"cat": "restaurant", "name": "Milk Beach", "famous": "Flat whites and sunny courtyard brunch", "arr": "Queen's Park", "addr": "19-25 Lonsdale Road, NW6 6RA", "lat": 51.5344, "lng": -0.2043, "typ": "Australian brunch", "sent": "Worth it - original QP site beats the Soho branch for calm"}, {"cat": "bakery", "name": "Hart & Lova", "famous": "Handmade organic cakes, croissants, celebration bakes", "arr": "Kilburn", "addr": "213a Belsize Road, NW6 4AA", "lat": 51.5375, "lng": -0.1922, "typ": "Bakery", "sent": "Under-the-radar local treasure; no queues, all quality"}, {"cat": "restaurant", "name": "Roti King", "famous": "Roti canai and curries at bargain prices", "arr": "Euston", "addr": "40 Doric Way, NW1 1LH", "lat": 51.5283, "lng": -0.1319, "typ": "Malaysian", "sent": "Worth it - basement original still the one; branches ease the queue"}, {"cat": "bakery", "name": "Layla Bakery", "famous": "Wood-fired sourdough and exceptional croissants", "arr": "Ladbroke Grove", "addr": "332 Portobello Road, W10 5RU", "lat": 51.5217, "lng": -0.2105, "typ": "Bakery (sourdough)", "sent": "Beloved local bakery at the Golborne end; skip Notting Hill crowds"}];
const map=L.map('map').setView([51.515, -0.13],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19}).addTo(map);
const groups={};
for(const k in CATS) groups[k]=L.layerGroup().addTo(map);
PLACES.forEach(p=>{
  const c=CATS[p.cat].color;
  const m=L.circleMarker([p.lat,p.lng],{radius:8,fillColor:c,fillOpacity:.92,color:'#fff',weight:2});
  m.bindPopup(`<div class="pop"><b>${p.name}</b><span class="arr" style="background:${c}">${p.arr}</span><p>${p.famous}</p><div class="ad">${p.addr}</div><div class="ad" style="color:${c};font-weight:600">${p.typ}</div><div class="sent">${p.sent}</div></div>`);
  m.addTo(groups[p.cat]);
});
const lg=document.getElementById('legend');
for(const k in CATS){
  const n=PLACES.filter(p=>p.cat===k).length;
  if(n===0) continue;
  const row=document.createElement('label');
  row.innerHTML=`<input type="checkbox" checked data-k="${k}"><span class="dot" style="background:${CATS[k].color}"></span>${CATS[k].label} (${n})`;
  row.querySelector('input').onchange=e=>{e.target.checked?map.addLayer(groups[k]):map.removeLayer(groups[k])};
  lg.appendChild(row);
}
map.fitBounds([[51.485, -0.235], [51.552, -0.07]]);
</script></body></html>
