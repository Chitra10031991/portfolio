<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chitra's Stockholm Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{margin:0;height:100%;font-family:-apple-system,'Segoe UI',Arial,sans-serif}
#map{height:100%}
.hdr{position:absolute;top:12px;left:56px;z-index:1000;background:#fff;padding:8px 16px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-weight:700;font-size:15px}
.hdr small{font-weight:400;color:#666;display:block}
.legend{position:absolute;bottom:20px;left:12px;z-index:1000;background:#fff;padding:10px 14px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:12.5px;line-height:1.9}
.legend label{display:flex;align-items:center;gap:7px;cursor:pointer}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.5)}
.pop b{font-size:13.5px}.pop .arr{color:#fff;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px}
.pop p{margin:5px 0 2px;font-size:12.5px}.pop .ad{color:#777;font-size:11.5px}
.pop .sent{font-size:11.5px;font-style:italic;color:#444;margin-top:4px}
</style></head><body>
<div id="map"></div>
<div class="hdr">Chitra's Stockholm Map <small>20 spots from Instagram saves &middot; July 2026</small></div>
<div class="legend" id="legend"></div>
<script>
const CATS={"coffee": {"label": "Coffee & Cafes", "color": "#8a5a2b"}, "bakery": {"label": "Bakery & Pastry", "color": "#d97706"}, "sweets": {"label": "Sweets & Ice Cream", "color": "#db2777"}, "restaurant": {"label": "Restaurants", "color": "#dc2626"}, "bar": {"label": "Bars & Nightlife", "color": "#7c3aed"}, "shopping": {"label": "Shopping", "color": "#2563eb"}, "culture": {"label": "Museums & Culture", "color": "#0d9488"}}, PLACES=[{"cat": "coffee", "name": "Gast", "famous": "Matcha, brunch and specialty coffee near Tegn\u00e9rlunden", "arr": "Vasastan", "addr": "R\u00e5dmansgatan 57", "lat": 59.3419, "lng": 18.0505, "typ": "Coffee + matcha", "sent": "Local gem - local crowd, zero tourist energy"}, {"cat": "coffee", "name": "Caf\u00e9 Pascal", "famous": "Beloved specialty coffee, toasts and pastries by Odenplan", "arr": "Vasastan", "addr": "Norrtullsgatan 4", "lat": 59.3437, "lng": 18.049, "typ": "Food + coffee (cafe)", "sent": "Worth it - deservedly hyped but still locals-first"}, {"cat": "coffee", "name": "Drop Coffee Roasters", "famous": "Award-winning light-roast pioneer near Mariatorget", "arr": "S\u00f6dermalm", "addr": "Wollmar Yxkullsgatan 10", "lat": 59.3172, "lng": 18.0625, "typ": "Coffee", "sent": "Worth it - coffee-nerd pilgrimage; buy beans to take home"}, {"cat": "bakery", "name": "Komet", "famous": "Artisan sourdough, cardamom buns, calm design", "arr": "Kungsholmen", "addr": "Kungsholmsgatan 10", "lat": 59.3298, "lng": 18.045, "typ": "Bakery + cafe", "sent": "Local gem - off tourist paths; also Tavastgatan 14 on S\u00f6der"}, {"cat": "coffee", "name": "Volca Coffee Roasters", "famous": "Small-batch roaster near Stadshuset", "arr": "Kungsholmen", "addr": "Hantverkargatan 8", "lat": 59.3273, "lng": 18.049, "typ": "Coffee", "sent": "Local gem - quiet quality steps from City Hall crowds"}, {"cat": "bakery", "name": "Svedjan Bageri (S\u00f6der)", "famous": "Cult sourdough and croissants from farm-grain bakers", "arr": "S\u00f6dermalm", "addr": "Br\u00e4nnkyrkagatan 93", "lat": 59.3182, "lng": 18.048, "typ": "Bakery", "sent": "Local gem - go early; bread sells out to Zinkensdamm regulars"}, {"cat": "coffee", "name": "A.B. Caf\u00e9", "famous": "Retro 1950s-style cafe with specialty coffee", "arr": "Midsommarkransen", "addr": "Valborgsm\u00e4ssov\u00e4gen 34", "lat": 59.2993, "lng": 17.999, "typ": "Coffee (retro)", "sent": "Worth the metro ride - Midsommarkransen is untouristed"}, {"cat": "coffee", "name": "Muttley & Jack's", "famous": "Indie roasters in far-east S\u00f6der (Barnangen)", "arr": "S\u00f6dermalm", "addr": "Barn\u00e4ngsgatan 13", "lat": 59.3113, "lng": 18.0925, "typ": "Coffee", "sent": "Local gem - deep-S\u00f6der locals-only vibe past SoFo"}, {"cat": "bakery", "name": "Stora Bageriet", "famous": "Stockholm's best-semla winner in a historic military bakery", "arr": "\u00d6stermalm", "addr": "Sibyllegatan 2", "lat": 59.3336, "lng": 18.0772, "typ": "Bakery (semlor)", "sent": "Worth it - polished \u00d6stermalm crowd; semla season essential"}, {"cat": "coffee", "name": "Kanaans Tr\u00e4dg\u00e5rdscaf\u00e9", "famous": "Lakeside garden cafe in Grimsta nature reserve", "arr": "Bromma (Grimsta)", "addr": "Kanaans v\u00e4g 83", "lat": 59.35, "lng": 17.857, "typ": "Garden cafe (fika)", "sent": "Local gem - pair with a M\u00e4laren swim at Kanaanbadet"}, {"cat": "coffee", "name": "Hedvig Eleonora sommarcaf\u00e9", "famous": "Fika under trees in a churchyard, summer only", "arr": "\u00d6stermalm", "addr": "Storgatan 2", "lat": 59.3347, "lng": 18.078, "typ": "Garden cafe (fika)", "sent": "Local gem - serene mid-city secret, \u00d6stermalm regulars"}, {"cat": "coffee", "name": "Gamla Orangeriet", "famous": "Orangery cafe inside Bergianska botanical garden", "arr": "Norra Djurg\u00e5rden", "addr": "Bergianska tr\u00e4dg\u00e5rden, Gustafsborgsv\u00e4gen 4", "lat": 59.37, "lng": 18.046, "typ": "Garden cafe (fika)", "sent": "Worth it - garden stroll plus fika, zero cruise-ship traffic"}, {"cat": "coffee", "name": "Stora Henriksvik", "famous": "18th-century garden cafe under V\u00e4sterbron on L\u00e5ngholmen", "arr": "L\u00e5ngholmen", "addr": "L\u00e5ngholmsmuren 20", "lat": 59.3216, "lng": 18.0235, "typ": "Garden cafe (fika)", "sent": "Local gem - idyllic island fika; combine with a swim"}, {"cat": "coffee", "name": "Mariedals Tr\u00e4dg\u00e5rdscaf\u00e9", "famous": "Waterside garden cafe on Hornsbergs strand", "arr": "Kungsholmen (Hornsberg)", "addr": "Hornsbergs Strand 14A", "lat": 59.3378, "lng": 18.0075, "typ": "Garden cafe (fika)", "sent": "Local gem - locals' sunset strip, no tourists"}, {"cat": "bar", "name": "Champagnebaren (S\u00f6dra Teatern)", "famous": "Terrace champagne bar with sweeping harbor views", "arr": "S\u00f6dermalm", "addr": "Mosebacke Torg 1-3", "lat": 59.3186, "lng": 18.0748, "typ": "Rooftop bar", "sent": "Worth it - view rivals Fotografiska's at half the fuss"}, {"cat": "bar", "name": "Bar Charles", "famous": "Rooftop atop Strand Hotel; archipelago views (opened 2025)", "arr": "Norrmalm (Blasieholmen)", "addr": "Nybrokajen 9", "lat": 59.332, "lng": 18.0745, "typ": "Rooftop bar", "sent": "Trendy - new and scene-y; book ahead, prices match the view"}, {"cat": "bar", "name": "Pelago", "famous": "Sprawling rooftop atop Katarinahuset, skyline panorama", "arr": "S\u00f6dermalm (Slussen)", "addr": "Urv\u00e4dersgr\u00e4nd 15A", "lat": 59.3199, "lng": 18.0736, "typ": "Rooftop bar", "sent": "Worth it - big enough to dodge crowds; go for aperitivo"}, {"cat": "bar", "name": "Takterrassen (Sven-Harrys)", "famous": "Art museum roof terrace with sculpture garden over Vasaparken", "arr": "Vasastan", "addr": "Eastmansv\u00e4gen 10-12", "lat": 59.3424, "lng": 18.0442, "typ": "Museum rooftop", "sent": "Hidden gem - cultured, calm alternative to hotel rooftops"}, {"cat": "bar", "name": "The Capital (Scandic Continental)", "famous": "Rooftop with Stadshuset views, opposite Central Station", "arr": "Norrmalm", "addr": "Vasagatan 22", "lat": 59.3315, "lng": 18.057, "typ": "Rooftop bar", "sent": "Fine - handy pre-train drink, business crowd"}, {"cat": "restaurant", "name": "SIN Ramen", "famous": "Homemade noodles, Korean fried oumph, open glass-wall kitchen", "arr": "Slakthusomr\u00e5det", "addr": "Hallv\u00e4gen 13, Johanneshov", "lat": 59.293, "lng": 18.0785, "typ": "Korean-fusion ramen", "sent": "Local gem - Meatpacking district energy, all locals"}];
const map=L.map('map').setView([59.328, 18.06],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19}).addTo(map);
const groups={};
for(const k in CATS) groups[k]=L.layerGroup().addTo(map);
PLACES.forEach(p=>{
  const c=CATS[p.cat].color;
  const m=L.circleMarker([p.lat,p.lng],{radius:8,fillColor:c,fillOpacity:.92,color:'#fff',weight:2});
  m.bindPopup(`<div class="pop"><b>${p.name}</b><span class="arr" style="background:${c}">${p.arr}</span><p>${p.famous}</p><div class="ad">${p.addr}</div><div class="ad" style="color:${c};font-weight:600">${p.typ}</div><div class="sent">${p.sent}</div></div>`);
  m.addTo(groups[p.cat]);
});
const lg=document.getElementById('legend');
for(const k in CATS){
  const n=PLACES.filter(p=>p.cat===k).length;
  if(n===0) continue;
  const row=document.createElement('label');
  row.innerHTML=`<input type="checkbox" checked data-k="${k}"><span class="dot" style="background:${CATS[k].color}"></span>${CATS[k].label} (${n})`;
  row.querySelector('input').onchange=e=>{e.target.checked?map.addLayer(groups[k]):map.removeLayer(groups[k])};
  lg.appendChild(row);
}
map.fitBounds([[59.29, 17.99], [59.372, 18.095]]);
</script></body></html>
